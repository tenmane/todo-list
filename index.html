<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Todo</title><link rel="icon" href="5dade17779267cb3945b.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"><script defer="defer" src="main.js"></script></head><body><header><img src="5dade17779267cb3945b.png" alt="Site Logo"> <span class="title">ToDo</span></header><main><nav><button class="all-tasks"><img src="e4c9dced59b78bc7adfe.svg" alt="All tasks"> <span>All tasks</span></button> <button class="projects"><img src="21bb42d2ae30e1fe3dd7.svg" alt="Projects icon"> <span>Projects</span></button><ul class="projects-holder"></ul><form id="project-form"><label for="add-project">Add Project: <input name="project" id="add-project" required></label> <button type="submit"><img src="b74c3a030e621931e06e.svg" alt=""></button></form></nav><div class="content"><div class="content-heading"><h1 class="project-title"></h1><button class="add-todo"><img src="b74c3a030e621931e06e.svg" alt=""> Add Todo</button></div><div id="todo-list"></div></div></main><dialog closedby="any" id="todo-modal"><form id="todo-form"><fieldset class="input-fields"><div><label for="title">TITLE</label> <input name="title" id="title" required></div><div><label for="description">DESCRIPTION (optional)</label> <textarea name="description" id="description" rows="5"></textarea></div><div><label for="date">DUE DATE</label> <input type="date" name="date" id="date" required></div></fieldset><fieldset class="priority-fields"><label for="priority">PRIORITY</label> <select name="priority" id="priority"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></fieldset><fieldset class="todo-btn-fields"><button type="submit" class="submit-todo">Submit</button> <button class="cancel-todo" type="button">Cancel</button></fieldset></form></dialog></body></html>
