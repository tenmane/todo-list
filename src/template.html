<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo</title>
  <link rel="icon" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <header>
    <img src="images/logo.png" alt="Site Logo">
    <span class="title">ToDo</span>
  </header>
  <main>
    <nav>
      <div>
        <img src="images/icons/tasks.svg" alt="All tasks">
        <span>All tasks</span>
      </div>
      <div>
        <img src="images/icons/important.svg" alt="important tasks">
        <span>Important</span>
      </div>
      <div class="projects-btn-container">
        <img src="images/icons/project.svg" alt="Projects icon">
        <button class="projects">Projects</button>
      </div>
      <ul class="projects-holder"></ul>
      <label for="add-project">
        Add Project:
        <input type="text" name="project" id="add-project">
      </label>
    </nav>
    <div class="content">

    </div>
  </main>
</body>

</html>
