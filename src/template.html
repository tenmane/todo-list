<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo</title>
  <link rel="icon" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <header>
    <img src="images/logo.png" alt="Site Logo">
    <span class="title">ToDo</span>
  </header>

  <main>
    <nav>
      <div>
        <img src="images/icons/tasks.svg" alt="All tasks">
        <span>All tasks</span>
      </div>
      <div>
        <img src="images/icons/important.svg" alt="important tasks">
        <span>Important</span>
      </div>
      <div class="projects-btn-container">
        <img src="images/icons/project.svg" alt="Projects icon">
        <button class="projects">Projects</button>
      </div>
      <ul class="projects-holder"></ul>
      <form id="project-form">
        <label for="add-project">
          Add Project:
          <input type="text" name="project" id="add-project">
        </label>
        <button type="submit">
          <img src="images/icons/add.svg" alt="">
        </button>
      </form>
    </nav>

    <div class="content">
      <div class="content-heading">
        <h1 class="project-title"></h1>
        <button class="add-todo">
          <img src="./images/icons/add.svg" alt="">
          Add Todo
        </button>
      </div>
    </div>
  </main>

  <dialog closedby="any" id="todo-modal">
    <form id="todo-form">
      <fieldset class="input-fields">
        <div>
          <label for="title">TITLE</label>
          <input type="text" name="title" id="title" required>
        </div>
        <div>
          <label for="description">DESCRIPTION (optional)</label>
          <textarea name="description" id="description" rows="5"></textarea>
        </div>
        <div>
          <label for="date">DUE DATE</label>
          <input type="date" name="date" id="date" required>
        </div>
      </fieldset>
      <fieldset class="priority-fields">
        <label for="priority">PRIORITY</label>
        <select name="priority" id="priority">
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </fieldset>
      <fieldset class="todo-btn-fields">
        <button type="submit" class="submit-todo">
          Submit
        </button>
        <button class="cancel-todo">
          Cancel
        </button>
      </fieldset>
    </form>
  </dialog>
</body>

</html>
